<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>สมัครสมาชิก - T.S. Pattani</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style> body { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; } .register-box { width: 100%; max-width: 450px; text-align: center; } </style>
</head>
<body>
    <div class="clean-card register-box">
        <i class="fa-solid fa-user-plus fa-3x mb-3 text-primary"></i>
        <h3 class="fw-bold text-dark">สร้างบัญชีใหม่</h3>
        <p class="text-muted mb-4">สมัครสมาชิกเพื่อเริ่มจองสนาม T.S. Pattani</p>

        <form action="index.html">
            <div class="text-start mb-1 text-muted small ms-2 fw-bold">ชื่อ-นามสกุล</div>
            <input type="text" class="form-control-clean mb-3" placeholder="เช่น นายสมชาย ใจดี" required>
            
            <div class="text-start mb-1 text-muted small ms-2 fw-bold">เบอร์โทรศัพท์</div>
            <input type="tel" class="form-control-clean mb-3" placeholder="08X-XXX-XXXX" required>
            
            <div class="text-start mb-1 text-muted small ms-2 fw-bold">รหัสผ่าน</div>
            <input type="password" class="form-control-clean mb-4" placeholder="ตั้งรหัสผ่านอย่างน้อย 8 ตัวอักษร" required>

            <button type="submit" class="btn btn-primary-clean w-100 py-2 mb-3" onclick="alert('สมัครสมาชิกสำเร็จ! กรุณาเข้าสู่ระบบ');">
                <i class="fa-solid fa-check me-2"></i> สมัครสมาชิก
            </button>
        </form>
        
        <div class="mt-3 pt-3 border-top">
            <span class="text-muted small">มีบัญชีอยู่แล้วใช่ไหม? </span>
            <a href="index.html" class="forgot-link fw-bold">เข้าสู่ระบบที่นี่</a>
        </div>
    </div>
</body>
</html>
